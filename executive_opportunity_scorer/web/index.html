<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EO Scorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="wordmark">EO Scorer</div>
      <nav class="tabs" role="tablist">
        <button class="tab is-active" data-view="score" role="tab" aria-selected="true">Score</button>
        <button class="tab" data-view="pipeline" role="tab" aria-selected="false">
          Pipeline
          <span id="pipeline-badge" class="badge-count hidden">0</span>
        </button>
      </nav>
      <div class="header-end">
        <button id="load-sample" class="btn-ghost" type="button">Load demo</button>
      </div>
    </div>
  </header>

  <!-- Score view -->
  <div id="view-score" class="view view-score">
    <div class="workspace">

      <section class="panel panel-form">
        <div class="panel-head">
          <h2 class="panel-title">Company</h2>
          <div class="panel-head-actions">
            <button id="enrich-btn" class="btn-secondary" type="button">Enrich from URL</button>
            <button id="score-button" class="btn-primary" type="button">Score →</button>
          </div>
        </div>
        <form id="dynamic-form" autocomplete="off"></form>
        <div id="enrich-status" class="enrich-status hidden"></div>
      </section>

      <section class="panel panel-output">
        <div id="status" class="status-msg">Score a company to see results here.</div>
        <div id="result-card" class="result-card hidden"></div>
      </section>

    </div>
  </div>

  <!-- Pipeline view -->
  <div id="view-pipeline" class="view hidden">
    <div class="pipeline-workspace">
      <div class="pipeline-head">
        <h2 class="panel-title">Pipeline</h2>
        <button id="refresh-pipeline" class="btn-ghost" type="button">Refresh</button>
      </div>
      <div id="pipeline-list" class="pipeline-list"></div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
